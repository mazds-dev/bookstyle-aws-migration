services:
  app:
    build: .
    container_name: bookstyle_app
    ports:
      - "80:80"
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: bookstyle_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: barbershop_services
      MYSQL_USER: bookstyle_user
      MYSQL_PASSWORD: bookstyle_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3307:3306"
    volumes:
      - bookstyle_mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: bookstyle_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    depends_on:
      - db

volumes:
  bookstyle_mysql_data: